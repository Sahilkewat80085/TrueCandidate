<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: 'Courier New', Courier, monospace;
      background: #000;
      color: #00ff66;
      margin: 0;
    }
    h2 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0;
      border-bottom: 1px solid #1c1c1c;
      padding-bottom: 8px;
      color: #fff;
    }
    .form-group {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 3px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: #0d0d0d;
      border: 1px solid #222;
      color: #fff;
      padding: 6px;
      font-family: inherit;
      font-size: 0.75rem;
    }
    input:focus {
      outline: none;
      border-color: #00ff66;
    }
    button {
      width: 100%;
      background: #00ff66;
      border: 1px solid #00ff66;
      color: #000;
      padding: 8px;
      font-family: inherit;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 10px;
      font-size: 0.8rem;
    }
    button:hover {
      background: #00cc52;
    }
    button.stop {
      background: #ff003c;
      border-color: #ff003c;
      color: #fff;
    }
    button.stop:hover {
      background: #cc0030;
    }
    #status {
      font-size: 0.7rem;
      margin-top: 10px;
      padding: 6px;
      background: #060606;
      border: 1px dashed #222;
      word-break: break-all;
    }
    .badge {
      display: inline-block;
      padding: 1px 4px;
      font-size: 0.6rem;
      text-transform: uppercase;
      font-weight: bold;
    }
    .badge.connected {
      background: rgba(0, 255, 102, 0.1);
      color: #00ff66;
      border: 1px solid #00ff66;
    }
    .badge.disconnected {
      background: rgba(255, 0, 60, 0.1);
      color: #ff003c;
      border: 1px solid #ff003c;
    }
  </style>
</head>
<body>
  <h2>TrueCandidate Connector</h2>
  
  <div id="setup-form">
    <div class="form-group">
      <label>Candidate Name</label>
      <input type="text" id="candidate-name" value="Priya Sharma">
    </div>
    <div class="form-group">
      <label>Candidate Email</label>
      <input type="text" id="candidate-email" value="priya.sharma@gmail.com">
    </div>
    <div class="form-group">
      <label>Interviewer Name</label>
      <input type="text" id="interviewer-name" value="Alex Chen">
    </div>
    <div class="form-group">
      <label>Position</label>
      <input type="text" id="position" value="Software Engineer Intern">
    </div>
    <button id="start-btn">Start Live Link</button>
  </div>

  <div id="active-session" style="display: none;">
    <div id="status">
      Status: <span class="badge connected">Linked</span><br>
      Session ID: <span id="session-id">None</span>
    </div>
    <button id="stop-btn" class="stop">Stop Monitoring</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
